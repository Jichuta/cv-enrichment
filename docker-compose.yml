services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: cv-enrichment:local
    container_name: cv-enrichment-api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Force host/port inside the container — these must not come from .env
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Dev override target ────────────────────────────────────────────────────
  # Run with: docker compose --profile dev up
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps        # reuse the deps layer, mount source live
    image: cv-enrichment:dev
    container_name: cv-enrichment-api-dev
    profiles: [dev]
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_DEBUG: "true"
    volumes:
      - ./app:/app/app        # live-reload source changes without rebuilds
      - ./run.py:/app/run.py
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
